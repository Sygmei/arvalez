name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  DOCKER_IMAGE: arvalez/cli

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish_latest: ${{ steps.version.outputs.publish_latest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag matches Cargo version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["workspace"]["package"]["version"])
          PY
          )"

          tag="${{ github.event.release.tag_name }}"
          normalized_tag="${tag#v}"

          if [[ "$normalized_tag" != "$version" ]]; then
            echo "Release tag '$tag' does not match Cargo workspace version '$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event.release.prerelease }}" != "true" ]]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

  publish-cli-binaries:
    runs-on: ${{ matrix.runner }}
    needs: validate-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: arvalez-cli-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: arvalez-cli-linux-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: arvalez-cli-macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: arvalez-cli-macos-arm64
          - runner: windows-2022
            target: i686-pc-windows-msvc
            asset_name: arvalez-cli-windows-x86.exe
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_name: arvalez-cli-windows-arm64.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        id: package
        shell: pwsh
        run: |
          $binaryName = "arvalez-cli"
          if ($env:RUNNER_OS -eq "Windows") {
            $binaryName += ".exe"
          }

          cargo build --locked --release -p arvalez-cli --target "${{ matrix.target }}"

          $sourcePath = Join-Path "target/${{ matrix.target }}/release" $binaryName
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}"
          Copy-Item -Path $sourcePath -Destination $assetPath
          $resolvedAssetPath = (Resolve-Path $assetPath).Path
          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset_path=$resolvedAssetPath"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.asset_path }}" --clobber

  publish-docker-amd64:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ needs.validate-release.outputs.version }}-amd64
          cache-from: type=gha,scope=cli-amd64
          cache-to: type=gha,scope=cli-amd64,mode=max

  publish-docker-arm64:
    runs-on: ubuntu-24.04-arm
    needs: validate-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64 CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ needs.validate-release.outputs.version }}-arm64
          cache-from: type=gha,scope=cli-arm64
          cache-to: type=gha,scope=cli-arm64,mode=max

  publish-docker-manifest:
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - publish-docker-amd64
      - publish-docker-arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.validate-release.outputs.version }}"

          docker buildx imagetools create \
            --tag "${DOCKER_IMAGE}:${version}" \
            "${DOCKER_IMAGE}:${version}-amd64" \
            "${DOCKER_IMAGE}:${version}-arm64"

          if [[ "${{ needs.validate-release.outputs.publish_latest }}" == "true" ]]; then
            docker buildx imagetools create \
              --tag "${DOCKER_IMAGE}:latest" \
              "${DOCKER_IMAGE}:${version}-amd64" \
              "${DOCKER_IMAGE}:${version}-arm64"
          fi

  publish-crates:
    runs-on: ubuntu-latest
    needs: validate-release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates to crates.io
        shell: bash
        run: |
          set -euo pipefail

          crates=(
            arvalez-ir
            arvalez-openapi
            arvalez-target-go
            arvalez-target-python
            arvalez-target-typescript
            arvalez-cli
          )

          publish_with_retry() {
            local crate="$1"
            local attempt

            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --locked; then
                return 0
              fi

              if [[ "$attempt" -eq 5 ]]; then
                echo "Failed to publish $crate after $attempt attempts." >&2
                return 1
              fi

              echo "Publish of $crate failed, waiting for crates.io index propagation before retry $((attempt + 1))..." >&2
              sleep 30
            done
          }

          for crate in "${crates[@]}"; do
            publish_with_retry "$crate"
          done
