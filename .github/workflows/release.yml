name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  DOCKER_IMAGE: arvalez/cli

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      docker_tags: ${{ steps.version.outputs.docker_tags }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag matches Cargo version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["workspace"]["package"]["version"])
          PY
          )"

          tag="${{ github.event.release.tag_name }}"
          normalized_tag="${tag#v}"

          if [[ "$normalized_tag" != "$version" ]]; then
            echo "Release tag '$tag' does not match Cargo workspace version '$version'." >&2
            exit 1
          fi

          docker_tags="${DOCKER_IMAGE}:${version}"
          if [[ "${{ github.event.release.prerelease }}" != "true" ]]; then
            docker_tags="${docker_tags},${DOCKER_IMAGE}:latest"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "docker_tags=$docker_tags" >> "$GITHUB_OUTPUT"

  publish-docker:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.validate-release.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-crates:
    runs-on: ubuntu-latest
    needs: validate-release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates to crates.io
        shell: bash
        run: |
          set -euo pipefail

          crates=(
            arvalez-ir
            arvalez-openapi
            arvalez-plugin-runtime
            arvalez-plugin-sdk
            arvalez-target-go
            arvalez-target-python
            arvalez-target-typescript
            arvalez-cli
          )

          publish_with_retry() {
            local crate="$1"
            local attempt

            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --locked; then
                return 0
              fi

              if [[ "$attempt" -eq 5 ]]; then
                echo "Failed to publish $crate after $attempt attempts." >&2
                return 1
              fi

              echo "Publish of $crate failed, waiting for crates.io index propagation before retry $((attempt + 1))..." >&2
              sleep 30
            done
          }

          for crate in "${crates[@]}"; do
            publish_with_retry "$crate"
          done
