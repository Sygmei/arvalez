[common]
disabled = false
template_dir = "./templates"

[common.output]
directory = "generated"
group_by_tag = true

[common.package]
name = "arvalez-client"
version = "0.1.0"
description = "Generated by Arvalez"

[target.go]
module_path = "github.com/arvalez/client"
template_dir = "./templates/go"

[target.python]
template_dir = "./templates/python"
[target.python.package]
version = "0.1.1"

[target.pythonmini]
disabled = true
template_dir = "./templates/pythonmini"
[target.pythonmini.output]
directory = "generated-pythonmini"

[target.typescript]
template_dir = "./templates/typescript"
